- name: Demo on filters
  hosts: local
  connection: local
  vars: 
   COURSE: "DAWS with Anisble"
   topics: linux, shell, terraform, ansible
   tagsMap:
    course: ansible
    duration: 10
    sessions: 8
   tagsList: [
        {
            "key": "course",
            "value": "ansible"
        },
        {
            "key": "duration",
            "value": 10
        },
        {
            "key": "sessions",
            "value": 8
        }
    ]
  tasks:
  - name: greetings
    ansible.builtin.debug:
     msg: "Hello Rakesh, {{ GREETING | default ('Good morning') }}"

  - name: slipting Variable
    ansible.builtin.debug:
     msg: "{{ topics | split (',') }}" 

  - name: converting map to list 
    ansible.builtin.debug:
     msg: "{{ tagsMap | dict2items }}" 
  
  - name: converting list to map
    ansible.builtin.debug:
     msg: "{{ tagsList | items2dict }}"
  
  - name: Yaml file into a variable
    ansible.builtin.set_fact:
     students_yaml: "{{ lookup('file', 'students.yaml') | from_yaml }}"

  - name: Converting yaml to JSON
    ansible.builtin.debug:
     msg: "{{ students_yaml | to_nice_json }}"

  - name: to UpperCase
    ansible.builtin.debug:
     msg: "{{ COURSE | to_uppercase }}"

  - name: to LowerCase
    ansible.builtin.debug:
     msg: "{{ COURSE | to_lowercase }}"